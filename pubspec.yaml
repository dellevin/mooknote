name: mooknote
description: "A Flutter application for tracking movies, books, and notes"
publish_to: 'none'
version: 0.1.5+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  fl_chart: ^0.69.0
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_markdown: ^0.7.4
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  cross_file: ^0.3.4
  archive: ^3.6.0
  permission_handler: ^11.3.0
  flutter_staggered_grid_view: ^0.7.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
